<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
</head>
<body class="text-center h-screen w-screen flex flex-col justify-center items-center bg-stone-200">
  <div class="w-full max-w-md rounded-[2rem] bg-white shadow-2xl shadow-blue-900 p-12">
      <h1 class="text-4xl font-bold">Create Account</h1>
      <br>
      <div class="flex flex-col justify-center items-center text-xl p-4">
        <form action="{{ url_for('register') }}" method="POST">
            <label>Username</label>
            <br>
            <input class="px-3 border rounded-full text-lg" type="text" name="username" required>
            <br>
            <label>Password</label>
            <br>
            <input class="px-3 border rounded-full text-lg" type="password" name="password" required>
            <br>
            <button class="text-gray-800 p-5 hover:text-gray-400" type="submit">Register</button>
          </form>
      </div>

      <br>
      <p class="font-serif">Already have an account? <a class="text-blue-900 hover:text-slate-400" href="{{ url_for('index') }}">Login here</a></p>
    </div>
  </body>
</html>
