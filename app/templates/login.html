    <title>Login</title>

<body>
    <h1>Login</h1>
    <form action="{{ url_for('login') }}" method="POST">

        <button type="submit">Login</button>
    </form>

    <br>
    <p>new? <a href="{{ url_for('register') }}">create account</a></p>

</body>
