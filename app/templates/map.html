<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script type="module" src="static/js/d3.js"></script>
</head>
<body>
  <nav class="fixed w-full top-0 z-50 bg-stone-200 shadow-md">
    <div class="flex flex-row justify-evenly py-4 text-2xl font-serif font-bold">
      {% if logged %}
        <a class="hover:text-slate-400" href="{{ url_for('logout') }}">LOG OUT</a>
      {% else %}
        <a class="hover:text-slate-400" href="{{ url_for('login') }}">LOG IN</a>
        <a class="hover:text-slate-400" href="{{ url_for('register') }}">REGISTER</a>
      {% endif %}
    </div>
  </nav>
<div class="flex flex-row w-full h-full mt-16">
  <br>
  <div class="flex flex-col h-full w-1/5 items-center mt-3">
    <div class="my-3 aspect-1/2 h-4/5 w-4/5 bg-red-300 text-2xl text-center font-mono">
        {% if not logged %}
          {% for ad in ads %}
            <img src={{ad}}>
          {% endfor %}
        {% endif %}
    </div>
  </div>
  <div class="h-full w-3/5 items-center text-center">
    <form method="POST" action="{{url_for('request_data')}}" class="flex gap-2 w-full max-w-md">
      <div class="relative w-full max-w-md">
        <input type="text" id="data-1" name="req-data-1" placeholder="" required autocomplete="off"
          class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
      </div>
      <button type="submit"
        class="bg-teal-500 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
        Search
      </button>
    </form>
    <div class="bg-red-500" id="container">placeholder D</div>
  </div>
  <div class="flex flex-col h-full w-1/5 items-center mt-3">
    <div class="my-3 h-4/5 w-4/5 bg-yellow-200 text-center items-center text-xl font-mono">
      {% if not logged %}
        LOG IN TO REMOVE ADS!
      {% endif %}
    </div>
  </div>
</div>
</body>
</html>
