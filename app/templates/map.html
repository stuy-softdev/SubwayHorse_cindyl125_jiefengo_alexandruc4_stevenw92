<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <script type="module" src="static/js/d3.js"></script>
</head>
<body>
  <nav class="fixed w-full top-0 z-50 bg-stone-200 shadow-md">
    <div class="flex flex-row justify-evenly py-3 text-xl font-serif">
      {% if logged %}
        <a class="hover:text-slate-400" href="{{ url_for('logout') }}">log out</a>
      {% else %}
        <a class="hover:text-slate-400" href="{{ url_for('login') }}">log in</a>
        <a class="hover:text-slate-400" href="{{ url_for('register') }}">register</a>
      {% endif %}
    </div>
  </nav>
<div class="pt-16" id="container"></div>
</body>
</html>
